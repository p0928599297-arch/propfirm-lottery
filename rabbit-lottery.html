<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水星兔 × PROPFIRM 抽獎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+TC:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0800;
  --surface: #1a1500;
  --surface2: #221c00;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --gold-pale: #f5e8b0;
  --gold-dim: rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.22);
  --gold-border2: rgba(201,168,76,0.45);
  --text: #f5eedc;
  --muted: #8a7a50;
  --serif: 'Cormorant Garamond', serif;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.deco{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.deco::before,.deco::after{content:'';position:absolute;width:1px;top:0;bottom:0;background:linear-gradient(to bottom,transparent,rgba(201,168,76,0.07),transparent)}
.deco::before{left:12%}.deco::after{right:12%}
.top-bar{position:sticky;top:0;z-index:10;border-bottom:1px solid var(--gold-border);background:rgba(10,8,0,0.9);backdrop-filter:blur(16px);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--gold-light);letter-spacing:.06em}
.logo span{color:var(--muted);font-family:var(--mono);font-size:12px;font-weight:400;margin-left:6px}
.date-chip{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--gold-border);border-radius:99px;padding:4px 12px;letter-spacing:.05em}

/* Sci-fi marquee */
.marquee-wrap{position:relative;background:#000;border-bottom:1px solid var(--gold-border);overflow:hidden;height:36px;display:flex;align-items:center}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none}
.marquee-wrap::before{left:0;background:linear-gradient(to right,#000,transparent)}
.marquee-wrap::after{right:0;background:linear-gradient(to left,#000,transparent)}
.marquee-label{font-family:var(--mono);font-size:9px;font-weight:700;color:#000;background:var(--gold);padding:3px 10px;letter-spacing:.15em;white-space:nowrap;z-index:3;flex-shrink:0;height:100%;display:flex;align-items:center}
.marquee-track{display:flex;align-items:center;white-space:nowrap;will-change:transform}
.marquee-track.animate{animation:marqueeScroll linear infinite}
@keyframes marqueeScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-item{display:inline-flex;align-items:center;gap:6px;margin-right:40px;font-family:var(--mono);font-size:11px;color:var(--gold-light);letter-spacing:.06em}
.marquee-item .m-num{display:inline-block;background:rgba(201,168,76,0.15);border:1px solid var(--gold-border2);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--gold);font-weight:700}
.marquee-item .m-sep{color:var(--muted);margin:0 2px}
.marquee-scan{position:absolute;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--gold-light),transparent);opacity:.5;animation:scan 3s linear infinite;z-index:1}
@keyframes scan{from{left:-2px}to{left:100%}}

.page{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:3rem 1.25rem 5rem}

.hero{text-align:center;margin-bottom:3rem;opacity:0;transform:translateY(20px);animation:fadeUp .7s ease .1s forwards}
.eyebrow{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.2em;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:12px}
.eyebrow::before,.eyebrow::after{content:'';display:block;height:1px;width:40px;background:linear-gradient(90deg,transparent,var(--gold))}
.eyebrow::after{transform:scaleX(-1)}
.hero h1{font-family:var(--serif);font-size:clamp(38px,8vw,58px);font-weight:700;color:var(--gold-pale);line-height:1.1;letter-spacing:-.01em;margin-bottom:.5rem}
.hero h1 em{color:var(--gold-light);font-style:italic}
.hero-sub{font-size:13px;color:var(--muted);letter-spacing:.04em}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem;opacity:0;animation:fadeUp .6s ease .25s forwards}
.stat{background:var(--surface);border:1px solid var(--gold-border);border-radius:12px;padding:1rem;text-align:center;transition:border-color .3s,transform .3s}
.stat:hover{border-color:var(--gold-border2);transform:translateY(-2px)}
.stat-val{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--gold-light);line-height:1}
.stat-label{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.08em;font-family:var(--mono)}

.prog-card{background:var(--surface);border:1px solid var(--gold-border);border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:1.5rem;opacity:0;animation:fadeUp .6s ease .35s forwards}
.prog-row{display:flex;justify-content:space-between;margin-bottom:10px}
.prog-row span{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.05em}
.prog-track{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:6px;border-radius:99px;background:linear-gradient(90deg,#6b500f,var(--gold),var(--gold-light));transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;position:relative}
.prog-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.25));animation:shim 1.8s ease-in-out infinite}
@keyframes shim{0%,100%{opacity:0}50%{opacity:1}}

.winner-banner{display:none;background:linear-gradient(135deg,rgba(201,168,76,0.09),rgba(232,201,106,0.15));border:1px solid var(--gold);border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1.5rem;animation:pop .5s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden}
.winner-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(201,168,76,0.03) 20px,rgba(201,168,76,0.03) 40px)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.w-crown{font-size:28px;margin-bottom:6px}
.w-label{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.2em;margin-bottom:8px}
.w-name{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--gold-pale);margin-bottom:4px}
.w-num{font-family:var(--mono);font-size:13px;color:var(--gold)}

.form-card{background:var(--surface);border:1px solid var(--gold-border);border-radius:16px;padding:1.4rem;margin-bottom:1.5rem;opacity:0;animation:fadeUp .6s ease .45s forwards;transition:border-color .3s}
.form-card:focus-within{border-color:var(--gold-border2)}
.form-label{font-size:10px;font-family:var(--mono);color:var(--gold);letter-spacing:.15em;margin-bottom:12px}
.input-row{display:flex;gap:8px}
.inp{flex:1;background:var(--surface2);border:1px solid var(--gold-border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--sans);padding:11px 14px;outline:none;transition:border-color .25s,box-shadow .25s}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
.inp::placeholder{color:var(--muted)}
.btn-gold{padding:11px 20px;border-radius:10px;font-size:13px;font-family:var(--mono);font-weight:700;cursor:pointer;border:1px solid var(--gold);background:linear-gradient(135deg,#7a5c12,var(--gold));color:#0a0800;letter-spacing:.05em;transition:.2s;white-space:nowrap;position:relative;overflow:hidden}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,0.28)}
.btn-gold:active{transform:translateY(0)}
.form-hint{font-size:11px;color:var(--muted);margin-top:10px}

.list-wrap{opacity:0;animation:fadeUp .6s ease .55s forwards}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.list-header span{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em}

.entry{background:var(--surface);border:1px solid var(--gold-border);border-radius:12px;padding:.85rem 1rem;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:border-color .25s,transform .25s;animation:slideIn .3s ease both}
.entry:hover{border-color:var(--gold-border2);transform:translateX(3px)}
.entry.is-winner{border-color:var(--gold);background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(232,201,106,0.05))}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

.num-box{width:46px;height:46px;border-radius:10px;border:1px solid var(--gold-border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:700;color:var(--gold-light);flex-shrink:0;transition:.25s}
.entry:hover .num-box{border-color:var(--gold-border2)}
.entry.is-winner .num-box{border-color:var(--gold);background:rgba(201,168,76,0.15);color:var(--gold-pale)}
.entry-info{flex:1;min-width:0}
.entry-name{font-size:14px;font-weight:500;color:var(--text)}
.entry-time{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.badge{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:6px;font-weight:700;flex-shrink:0;letter-spacing:.05em}
.badge-rank{background:var(--surface2);color:var(--muted);border:1px solid var(--gold-border)}
.badge-win{background:rgba(201,168,76,0.15);color:var(--gold-light);border:1px solid var(--gold-border2)}
.empty-state{text-align:center;padding:3rem 0;color:var(--muted);font-size:13px}
.empty-icon{font-size:30px;margin-bottom:10px;opacity:.5}

.admin-card{margin-top:2rem;background:var(--surface);border:1px solid var(--gold-border);border-radius:16px;padding:1.25rem;opacity:0;animation:fadeUp .6s ease .65s forwards}
.admin-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.15em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.admin-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.4}
.admin-row{display:flex;gap:8px;flex-wrap:wrap}
.adm-inp{background:var(--surface2);border:1px solid var(--gold-border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--mono);padding:9px 12px;outline:none;width:150px;transition:border-color .2s}
.adm-inp:focus{border-color:var(--gold-border2)}
.btn-ghost{padding:9px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);font-weight:700;cursor:pointer;border:1px solid var(--gold-border2);background:transparent;color:var(--gold-light);transition:.2s;letter-spacing:.04em}
.btn-ghost:hover{background:var(--gold-dim);border-color:var(--gold)}
.btn-red{padding:9px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);font-weight:700;cursor:pointer;border:1px solid rgba(192,57,43,0.3);background:transparent;color:#e74c3c;transition:.2s}
.btn-red:hover{background:rgba(192,57,43,0.12)}

#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--gold-pale);color:#0a0800;font-size:13px;font-family:var(--mono);font-weight:700;padding:10px 24px;border-radius:99px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:99;white-space:nowrap;letter-spacing:.04em}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:5}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:420px){.stats-row{grid-template-columns:1fr 1fr}.input-row{flex-direction:column}.admin-row{flex-direction:column}.adm-inp{width:100%}}
</style>
</head>
<body>
<div class="deco"></div>
<canvas id="confetti"></canvas>

<div class="top-bar">
  <div class="logo">水星兔 <span>× PROPFIRM</span></div>
  <div class="date-chip" id="top-date"></div>
</div>

<div class="marquee-wrap" id="marquee-wrap">
  <div class="marquee-label">LIVE ▶</div>
  <div style="overflow:hidden;flex:1;position:relative">
    <div class="marquee-scan"></div>
    <div class="marquee-track" id="marquee-track">
      <span class="marquee-item" style="color:var(--muted);letter-spacing:.1em">— 等待報名中 —</span>
    </div>
  </div>
</div>

<div class="page">
  <div class="hero">
    <div class="eyebrow">DAILY LOTTERY</div>
    <h1>帳號<br><em>抽獎活動</em></h1>
    <p class="hero-sub">系統隨機分配 · 每日限 100 人 · 公開透明</p>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val">100</div><div class="stat-label">每日名額</div></div>
    <div class="stat"><div class="stat-val" id="s-joined">0</div><div class="stat-label">已報名</div></div>
    <div class="stat"><div class="stat-val" id="s-left">100</div><div class="stat-label">剩餘名額</div></div>
  </div>

  <div class="prog-card">
    <div class="prog-row"><span>TODAY'S PROGRESS</span><span id="prog-pct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </div>

  <div id="winner-banner" class="winner-banner">
    <div class="w-crown">🏆</div>
    <div class="w-label">TODAY'S WINNER</div>
    <div class="w-name" id="w-name"></div>
    <div class="w-num" id="w-num"></div>
  </div>

  <div class="form-card">
    <div class="form-label">REGISTER</div>
    <div class="input-row">
      <input class="inp" type="text" id="inp-name" placeholder="輸入名字或 LINE ID" maxlength="20">
      <button class="btn-gold" onclick="register()">報名</button>
    </div>
    <p class="form-hint">系統自動分配 0–100 隨機號碼，每人限報一次</p>
  </div>

  <div class="list-wrap">
    <div class="list-header">
      <span>ENTRIES</span>
      <span id="list-count">0 / 100</span>
    </div>
    <div id="list-area">
      <div class="empty-state"><div class="empty-icon">🎯</div>還沒有人報名，快來搶第一！</div>
    </div>
  </div>

  <div class="admin-card">
    <div class="admin-label">管理員區域</div>
    <div class="admin-row">
      <input class="adm-inp" type="password" id="adm-pw" placeholder="管理員密碼">
      <button class="btn-ghost" onclick="adminDraw()">🎰 抽出得獎者</button>
      <button class="btn-red" onclick="adminReset()">開新一輪</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const LIMIT=100,ADMIN_PW='propfirm2026';
const KEYS={entries:'pf_entries',winner:'pf_winner',round:'pf_round'};
function load(){try{return JSON.parse(localStorage.getItem(KEYS.entries)||'[]')}catch{return[]}}
function save(a){localStorage.setItem(KEYS.entries,JSON.stringify(a))}
function getWinner(){return localStorage.getItem(KEYS.winner)}
function setWinner(n){localStorage.setItem(KEYS.winner,n)}
function getRound(){return parseInt(localStorage.getItem(KEYS.round)||'1')}
function nextRound(){localStorage.setItem(KEYS.round,getRound()+1)}

function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=innerWidth;canvas.height=innerHeight;
  const cols=['#c9a84c','#e8c96a','#f5e8b0','#fff8dc','#8a6a1a','#ffffff'];
  const pieces=Array.from({length:90},()=>({
    x:Math.random()*canvas.width,y:-20,
    w:Math.random()*8+4,h:Math.random()*14+6,
    r:Math.random()*Math.PI,
    vx:(Math.random()-.5)*3,vy:Math.random()*4+2,
    vr:(Math.random()-.5)*.15,
    color:cols[Math.floor(Math.random()*cols.length)],alpha:1
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=.06;
      if(frame>70)p.alpha-=.012;
      ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<140)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

function renderMarquee(entries){
  const track=document.getElementById('marquee-track');
  if(!entries.length){
    track.style.animation='none';
    track.innerHTML='<span class="marquee-item" style="color:var(--muted);letter-spacing:.1em">— 等待報名中 —</span>';
    return;
  }
  const items=entries.map(e=>`<span class="marquee-item">
    <span class="m-num">#${e.num}</span>
    <span class="m-sep">◈</span>
    ${e.name}
    <span class="m-sep">·</span>
    <span style="color:var(--muted);font-size:10px">${e.time}</span>
  </span>`).join('');
  // duplicate for seamless loop
  track.innerHTML=items+items;
  const totalW=track.scrollWidth/2;
  const dur=Math.max(10,totalW/60);
  track.style.animation='none';
  track.offsetWidth;
  track.style.animation=`marqueeScroll ${dur}s linear infinite`;
}

function render(){
  const entries=load(),joined=entries.length,left=Math.max(0,LIMIT-joined);
  const pct=Math.round(joined/LIMIT*100),winner=getWinner();
  document.getElementById('s-joined').textContent=joined;
  document.getElementById('s-left').textContent=left;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('list-count').textContent=`${joined} / ${LIMIT}`;
  document.getElementById('top-date').textContent=`第 ${getRound()} 輪 · `+new Date().toLocaleDateString('zh-TW',{month:'long',day:'numeric'});
  const wb=document.getElementById('winner-banner');
  if(winner){
    const we=entries.find(e=>e.name===winner);
    wb.style.display='block';
    document.getElementById('w-name').textContent=winner;
    document.getElementById('w-num').textContent=`號碼 #${we?we.num:'—'}`;
  } else wb.style.display='none';
  const la=document.getElementById('list-area');
  renderMarquee(entries);
  if(!entries.length){la.innerHTML='<div class="empty-state"><div class="empty-icon">🎯</div>還沒有人報名，快來搶第一！</div>';return;}
  la.innerHTML=entries.map((e,i)=>{
    const isW=e.name===winner;
    return`<div class="entry${isW?' is-winner':''}" style="animation-delay:${i*.04}s">
      <div class="num-box">${e.num}</div>
      <div class="entry-info"><div class="entry-name">${e.name}</div><div class="entry-time">${e.time}</div></div>
      <div class="badge ${isW?'badge-win':'badge-rank'}">${isW?'🏆 得獎':'#'+(i+1)}</div>
    </div>`;
  }).join('');
}

function register(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){toast('請輸入名字或 LINE ID');return;}
  const entries=load();
  if(entries.length>=LIMIT){toast('今日名額已滿！');return;}
  if(entries.find(e=>e.name===name)){toast('你已經報名過囉！');return;}
  const used=new Set(entries.map(e=>e.num));
  let num;do{num=Math.floor(Math.random()*101)}while(used.has(num));
  const now=new Date();
  const time=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  entries.push({name,num,time});save(entries);
  document.getElementById('inp-name').value='';
  toast(`✦ 報名成功！你的號碼是 ${num}`);render();
}

function adminDraw(){
  if(document.getElementById('adm-pw').value!==ADMIN_PW){toast('密碼錯誤');return;}
  const entries=load();
  if(!entries.length){toast('還沒有人報名');return;}
  const w=entries[Math.floor(Math.random()*entries.length)];
  setWinner(w.name);launchConfetti();
  toast(`🎉 得獎者：${w.name}，號碼 ${w.num}`,4000);render();
}

function adminReset(){
  if(document.getElementById('adm-pw').value!==ADMIN_PW){toast('密碼錯誤');return;}
  if(!confirm('確定開始新一輪？目前名單與得獎者將清空。'))return;
  localStorage.removeItem(KEYS.entries);localStorage.removeItem(KEYS.winner);
  nextRound();
  toast(`✦ 第 ${getRound()} 輪開始！`);render();
}

render();
</script>
</body>
</html>
